{% extends 'base.html' %}
{% block content %}
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2>{{ board.title }}</h2>
        <a href="{{ url_for('new_thread', board_id=board.id) }}" class="btn">+ Создать тему</a>
    </div>
    <div class="forum-category">
        <div class="category-header">Темы раздела</div>
        {% for thread in threads %}
        <div class="board-row">
            <div class="board-info">
                <a href="{{ url_for('thread', thread_id=thread.id) }}">{{ thread.title }}</a>
                <div class="board-desc">Автор: {{ thread.author }} | Дата: {{ thread.date }}</div>
            </div>
        </div>
        {% endfor %}
    </div>
{% endblock %}
