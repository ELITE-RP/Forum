<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Elite RP Forum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h1>Elite RP Forum</h1>
        <form action="/add" method="POST" class="my-4">
            <input name="author" class="form-control mb-2" placeholder="Ваш ник" required>
            <input name="title" class="form-control mb-2" placeholder="Заголовок жалобы" required>
            <textarea name="content" class="form-control mb-2" placeholder="Описание"></textarea>
            <button class="btn btn-primary">Отправить</button>
        </form>
        <hr>
        {% for c in complaints %}
        <div class="card bg-secondary text-white mb-3">
            <div class="card-body">
                <h5>{{ c.title }}</h5>
                <p>{{ c.content }}</p>
                <small>Автор: {{ c.author }}</small>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
