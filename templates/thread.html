{% extends 'base.html' %}
{% block content %}
    <h2>{{ thread.title }}</h2>
    {% for post in thread.posts %}
    <div class="post-card">
        <div style="font-weight: bold; color: #9d4edd; margin-bottom: 5px;">{{ post.author }}</div>
        <div style="font-size: 12px; color: #a5a1b8; margin-bottom: 10px;">{{ post.date }}</div>
        <div style="white-space: pre-line;">{{ post.text }}</div>
    </div>
    {% endfor %}
    <div class="forum-category" style="padding: 20px; margin-top: 30px;">
        <h3 style="margin-top: 0; color: #e0aaff;">Оставить ответ</h3>
        <form method="POST">
            <div class="form-group">
                <label>Ваш никнейм:</label>
                <input type="text" name="author" class="form-control" placeholder="Имя_Фамилия" required>
            </div>
            <div class="form-group">
                <label>Сообщение:</label>
                <textarea name="text" rows="5" class="form-control" placeholder="Введите текст ответа..." required></textarea>
            </div>
            <button type="submit" class="btn">Отправить ответ</button>
        </form>
    </div>
{% endblock %}
