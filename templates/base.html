<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ELITE RP Форум{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="header-container">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="ELITE RP Logo" class="forum-logo">
            <div class="logo-text">ELITE <span>RP</span></div>
        </div>
        <div style="color: #a5a1b8; font-size: 13px; margin-top: 8px; letter-spacing: 1px;">ОФИЦИАЛЬНЫЙ ФОРУМ ИГРОВОГО СООБЩЕСТВА</div>
    </header>
    <div class="container">
        <p><a href="/" style="color: #c77dff; text-decoration: none; font-weight: bold;">🏠 Главная страница</a></p>
        {% block content %}{% endblock %}
    </div>
</body>
</html>
