{% extends 'base.html' %}
{% block content %}
    <h2>Создание новой темы</h2>
    <div class="forum-category" style="padding: 20px;">
        <form method="POST">
            <div class="form-group">
                <label>Название темы:</label>
                <input type="text" name="title" class="form-control" placeholder="Заголовок темы" required>
            </div>
            <div class="form-group">
                <label>Ваш никнейм:</label>
                <input type="text" name="author" class="form-control" placeholder="Имя_Фамилия" required>
            </div>
            <div class="form-group">
                <label>Суть темы / Текст сообщения:</label>
                <textarea name="text" rows="8" class="form-control" placeholder="Опишите вашу тему подробно..." required></textarea>
            </div>
            <button type="submit" class="btn">Создать тему</button>
        </form>
    </div>
{% endblock %}
